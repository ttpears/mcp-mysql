name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build

      - name: Publish to npm with provenance
        # Trusted publishing requires npm >= 11.5.1; Node 22 ships with npm 10.x,
        # and `npm install -g npm@latest` has a self-upgrade bug on Node 22, so
        # invoke a fresh npm via npx for the publish step only.
        run: npx -y npm@latest publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --generate-notes
